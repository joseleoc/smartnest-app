<ion-split-pane contentId="main-content" *transloco="let t">
  <ion-menu contentId="main-content" type="overlay">
    <ion-content>
      <ion-list id="inbox-list">
        <ion-list-header>{{ t("APP_NAME") }}</ion-list-header>
        <ion-note>{{ t("APP_SLOGAN") }}</ion-note>

        @for (p of appPages; track $index; let first = $first) {
          <ion-menu-toggle auto-hide="false">
            <ion-item
              routerDirection="root"
              [routerLink]="[p.url]"
              lines="none"
              detail="false"
              routerLinkActive="selected"
            >
              <ion-icon slot="start" [name]="p.icon" color="primary"></ion-icon>
              <ion-label>{{ t(p.title + ".TITLE") }} </ion-label>
            </ion-item>
          </ion-menu-toggle>
        }
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-split-pane>
